name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies (incl. dev tools)
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Lint (ruff)
        run: uv run ruff check .
